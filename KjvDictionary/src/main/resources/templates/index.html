<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	

<head>
    <title>KJV Dictionary</title>

    <style>

        body{
            font-family: Arial;
            margin:0;
			
			display:flex;
			justify-content:center;
			align-items:center;
    	    min-height:100vh;
			background:#f4f4f4;
        }

        .box{
			border:1px solid gray;
			padding:40px;
			width:500px;
			background:white;
			border-radius:10px;
			box-shadow:0 0 10px rgba(0,0,0,0.1);
			
        }

		ul{
		    padding-left:25px;
		}

		li{
		    margin-bottom:12px;
		    line-height:1.5;
		}
    </style>

</head>
<body>

<div class="box">

    <h2>KJV ENGLISH VOCABULARY</h2>

    <form action="/search" method="post">

		<select name="word">

		    <option th:each="w : ${words}"
		            th:value="${w}"
		            th:text="${w}"
		            th:selected="${#strings.equalsIgnoreCase(w, selectedWord)}">
		    </option>

		</select>

        <button type="submit">
            Submit
        </button>

    </form>

    <hr>

    <div th:if="${result != null}">

		<h3>Word</h3>

		<p th:text="${result.name}"></p>
		
        <h3>Meaning</h3>

        <p th:text="${result.meaning}"></p>

		<h3>References</h3>

		<ul>
			<li th:each="ref : ${result.references}">
			    <span th:utext="${ref.replaceAll(
			        '(?i)(?<!\\w)' + selectedWord + '(?!\\w)',
			        '<mark>$0</mark>'
			    )}">
			    </span>
			</li>
		</ul>
    </div>

</div>

</body>
</html>
